{% extends "base.html" %}

{% block title %}Add New Book{% endblock %}


{% block content %}


  <h1>Add a Book</h1>

  <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save Book</button>
  </form>

  <br>
  <a href="{% url 'library:book_list' %}">← Cancel</a>


{% endblock %}
