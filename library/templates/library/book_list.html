

 {% extends "base.html" %}

  {% block title %}All Books{% endblock %}

  {% block content %}
  <h1>All Books</h1>

{% for book in books %}
      <p>
          <a href="{% url 'library:book_detail' book.pk %}">
              <strong>{{ book.title }}</strong>
          </a>
          — {{ book.author.name }}
      </p>
  {% empty %}
      <p>No books in the library yet.</p>
  {% endfor %}
  {% endblock %}
