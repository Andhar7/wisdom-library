  {% extends "base.html" %}

  {% block title %}Edit {{ book.title }}

  {% endblock %}

  {% block content %}
  <h1>Edit Book</h1>

  <form method="post">
      {% csrf_token %}

      <p>
          <label>Title:</label><br>
          <input type="text" name="title" value="{{ book.title }}" required>
      </p>

      <p>
          <label>Author:</label><br>
          <select name="author_id">
              {% for author in authors %}
              <option value="{{author.pk}}"
              {% if author.pk == book.author.pk %}
              selected
              {% endif %}>
              {{author.name}}
              </option>
              {% endfor %}
          </select>
      </p>

      <button type="submit">Save Changes</button>
  </form>

  <br>
  <a href="{% url 'library:book_detail' book.pk %}">← Cancel</a>
  {% endblock %}
